<title>Stuvix — Study smarter. Stay organized. Achieve more.</title>
<meta name="description" content="Stuvix helps students organize assignments, prepare for exams, track progress, and build better study habits — all in one place.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="icon" type="image/png" href="/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Inter+Tight:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{
  --bg:#FAFAFA; --bg-elev:#FFFFFF; --card:#FFFFFF; --border:rgba(15,15,20,0.08);
  --text:#0B0B0E; --text-dim:#5B5F6B; --text-faint:#8A8E99;
  --primary:#2563EB; --primary-dim:#1D4ED8; --accent:#10B981;
  --ring: rgba(37,99,235,0.14);
  --shadow-sm: 0 1px 2px rgba(15,15,20,0.04), 0 1px 1px rgba(15,15,20,0.03);
  --shadow-md: 0 4px 16px rgba(15,15,20,0.06), 0 1px 2px rgba(15,15,20,0.04);
  --shadow-lg: 0 20px 40px -12px rgba(15,15,20,0.14), 0 4px 12px rgba(15,15,20,0.06);
  --shadow-xl: 0 30px 70px -20px rgba(15,15,20,0.28);
  --amber:#D97706; --red:#DC2626;
  --ease: cubic-bezier(.16,1,.3,1);
}
html.dark{
  --bg:#09090B; --bg-elev:#0F0F12; --card:#131316; --border:rgba(255,255,255,0.08);
  --text:#F5F5F7; --text-dim:#A3A3AD; --text-faint:#6B6B76;
  --primary:#3B82F6; --primary-dim:#2563EB; --accent:#34D399;
  --ring: rgba(59,130,246,0.18);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.45);
  --shadow-lg: 0 20px 50px -12px rgba(0,0,0,0.6);
  --shadow-xl: 0 30px 80px -20px rgba(0,0,0,0.7);
  --amber:#F59E0B; --red:#F87171;
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0; background:var(--bg); color:var(--text);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  transition:background .5s var(--ease), color .5s var(--ease);
}
h1,h2,h3,h4{font-family:'Inter Tight','Inter',sans-serif; letter-spacing:-0.02em; margin:0;}
p{margin:0;}
.wrap{max-width:1320px; margin:0 auto; padding:0 32px;}
@media(max-width:900px){.wrap{padding:0 20px;}}
a{text-decoration:none; color:inherit;}
button{font-family:inherit; cursor:pointer;}
input,select,textarea{font-family:inherit;}
::selection{background:var(--primary); color:#fff;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border); border-radius:20px;}
svg.i{width:100%; height:100%;}
.hidden{display:none !important;}
.spin{animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ---------- NAV ---------- */
.nav{position:fixed; top:0; left:0; right:0; z-index:100; padding:18px 0; transition:all .4s var(--ease); border-bottom:1px solid transparent;}
.nav.scrolled{background:color-mix(in srgb, var(--bg) 72%, transparent); backdrop-filter:blur(20px) saturate(180%); -webkit-backdrop-filter:blur(20px) saturate(180%); border-bottom:1px solid var(--border); padding:14px 0;}
.nav-inner{display:flex; align-items:center; justify-content:space-between; max-width:1320px; margin:0 auto; padding:0 32px;}
.brand{display:flex; align-items:center; gap:10px; font-weight:800; font-size:18px; letter-spacing:-0.01em; transition:opacity .2s;}
.brand:hover{opacity:.85;}
.brand-mark{width:32px;height:32px; flex-shrink:0;}
.nav-center{display:flex; align-items:center; gap:4px; position:absolute; left:50%; transform:translateX(-50%);}
.nav-link{padding:9px 16px; border-radius:10px; font-size:14px; font-weight:500; color:var(--text-dim); transition:all .25s var(--ease);}
.nav-link:hover{color:var(--text); background:var(--border);}
.nav-right{display:flex; align-items:center; gap:10px;}
.icon-btn{width:40px;height:40px; display:flex; align-items:center; justify-content:center; border-radius:10px; border:1px solid var(--border); background:var(--bg-elev); color:var(--text-dim); transition:all .25s var(--ease); padding:9px;}
.icon-btn:hover{color:var(--text); border-color:color-mix(in srgb, var(--text) 20%, var(--border)); transform:translateY(-2px) rotate(-4deg);}
@media(max-width:900px){.nav-center{display:none;}}
.hamburger{display:none;}
@media(max-width:900px){.hamburger{display:flex;}}
.mobile-menu{display:none; flex-direction:column; gap:6px; padding:16px 20px 20px; border-top:1px solid var(--border); background:var(--bg-elev);}
.mobile-menu.open{display:flex; animation:dropIn .3s var(--ease);}
@keyframes dropIn{from{opacity:0; transform:translateY(-8px);}to{opacity:1; transform:translateY(0);}}

/* ---------- BUTTONS ---------- */
.btn{display:inline-flex; align-items:center; justify-content:center; gap:8px; height:52px; padding:0 26px; border-radius:14px; font-weight:600; font-size:15px; border:1px solid transparent; transition:transform .22s var(--ease), box-shadow .3s var(--ease), background .25s ease, border-color .25s ease, opacity .2s; white-space:nowrap;}
.btn:active{transform:scale(0.96);}
.btn:disabled{opacity:.6; cursor:progress; transform:none;}
.btn-primary{background:linear-gradient(180deg, var(--primary), var(--primary-dim)); color:#fff; box-shadow:0 1px 0 rgba(255,255,255,0.15) inset, 0 8px 20px -6px rgba(37,99,235,0.55);}
.btn-primary:hover{box-shadow:0 1px 0 rgba(255,255,255,0.2) inset, 0 14px 30px -6px rgba(37,99,235,0.65); transform:translateY(-2px);}
.btn-secondary{background:var(--bg-elev); color:var(--text); border-color:var(--border); box-shadow:var(--shadow-sm);}
.btn-secondary:hover{border-color:color-mix(in srgb, var(--text) 22%, var(--border)); transform:translateY(-2px);}
.btn-ghost{background:transparent; color:var(--text-dim); height:auto; padding:8px 10px;}
.btn-ghost:hover{color:var(--primary);}
.btn-danger{background:var(--red); color:#fff;}
.btn-sm{height:40px; padding:0 16px; font-size:13.5px; border-radius:10px;}
.btn-block{width:100%;}

/* ---------- CARD ---------- */
.card{background:var(--card); border:1px solid var(--border); border-radius:20px; box-shadow:var(--shadow-sm); padding:24px; transition:box-shadow .3s var(--ease), border-color .3s var(--ease), background .3s ease, transform .3s var(--ease);}

/* ---------- HERO ---------- */
.hero{position:relative; padding:168px 0 90px; overflow:hidden;}
.hero-glow{position:absolute; inset:0; z-index:0; pointer-events:none;}
.hero-glow span{position:absolute; border-radius:50%; filter:blur(90px); opacity:.35; animation:drift 12s ease-in-out infinite;}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(20px,-16px) scale(1.06);}}
.hero-glow .g1{width:480px;height:480px; background:radial-gradient(circle,#2563EB,transparent 70%); top:-160px; left:-120px;}
.hero-glow .g2{width:420px;height:420px; background:radial-gradient(circle,#10B981,transparent 70%); top:60px; right:-140px; opacity:.22; animation-delay:2s;}
html.dark .hero-glow span{opacity:.18;}
.hero-grid{position:relative; z-index:1; display:grid; grid-template-columns:1.05fr 0.95fr; gap:56px; align-items:center;}
@media(max-width:980px){.hero-grid{grid-template-columns:1fr; text-align:center;}}
.eyebrow{display:inline-flex; align-items:center; gap:8px; padding:7px 14px 7px 8px; border-radius:100px; background:var(--bg-elev); border:1px solid var(--border); font-size:13px; font-weight:600; color:var(--text-dim); box-shadow:var(--shadow-sm); margin-bottom:24px; animation:fadeDown .7s var(--ease) both;}
.eyebrow .dot{width:8px;height:8px;border-radius:50%; background:var(--accent); box-shadow:0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent); animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent);}50%{box-shadow:0 0 0 6px color-mix(in srgb, var(--accent) 12%, transparent);}}
@keyframes fadeDown{from{opacity:0; transform:translateY(-10px);}to{opacity:1; transform:translateY(0);}}
.hero h1{font-size:clamp(40px,5.4vw,64px); line-height:1.06; font-weight:800; margin-bottom:22px; animation:fadeUp .8s var(--ease) both; animation-delay:.05s;}
.hero h1 .grad{background:linear-gradient(100deg, var(--primary), var(--accent)); -webkit-background-clip:text; background-clip:text; color:transparent;}
@keyframes fadeUp{from{opacity:0; transform:translateY(22px);}to{opacity:1; transform:translateY(0);}}
.hero p.lead{font-size:19px; line-height:1.6; color:var(--text-dim); max-width:520px; margin-bottom:36px; animation:fadeUp .8s var(--ease) both; animation-delay:.15s;}
@media(max-width:980px){.hero p.lead{margin-left:auto;margin-right:auto;}}
.hero-btns{display:flex; gap:14px; flex-wrap:wrap; animation:fadeUp .8s var(--ease) both; animation-delay:.25s;}
@media(max-width:980px){.hero-btns{justify-content:center;}}

/* floating hero cards */
.hero-visual{position:relative; height:480px;}
@media(max-width:980px){.hero-visual{height:360px; margin-top:20px;}}
.mock-panel{position:relative; background:var(--card); border:1px solid var(--border); border-radius:22px; box-shadow:var(--shadow-lg); padding:22px; z-index:1; animation:fadeUp 1s var(--ease) both; animation-delay:.3s;}
.mock-row{display:flex; gap:14px; margin-bottom:14px;}
.mock-box{flex:1; background:var(--bg-elev); border:1px solid var(--border); border-radius:14px; padding:16px; font-size:13px; transition:transform .3s var(--ease); }
.mock-box:hover{transform:translateY(-3px);}
.mock-box h5{font-size:12.5px; font-weight:700; margin-bottom:8px; display:flex; align-items:center; gap:6px; color:var(--text-dim);}
.mock-box h5 svg{width:14px;height:14px; color:var(--primary);}
.mock-chart{height:64px; border-radius:10px; background:linear-gradient(180deg, color-mix(in srgb, var(--primary) 18%, transparent), transparent); position:relative; overflow:hidden;}
.mock-chart::after{content:""; position:absolute; inset:0; background:linear-gradient(100deg,transparent 30%, color-mix(in srgb, var(--primary) 35%, transparent) 50%, transparent 70%); animation:shine 2.6s infinite;}
@keyframes shine{0%{transform:translateX(-100%);}100%{transform:translateX(100%);}}
.float-card{position:absolute; background:var(--card); border:1px solid var(--border); border-radius:16px; box-shadow:var(--shadow-lg); padding:12px 16px; font-size:13px; font-weight:700; animation:floaty 5s ease-in-out infinite, fadeUp .8s var(--ease) both; z-index:2; display:flex; align-items:center; gap:8px;}
.float-card svg{width:16px;height:16px; color:var(--accent); flex-shrink:0;}
@keyframes floaty{0%,100%{transform:translateY(0);}50%{transform:translateY(-14px);}}
.fc1{top:-14px; right:-14px; animation-delay:0s, .4s;}
.fc2{bottom:60px; left:-24px; animation-delay:1.1s, .5s;}
.fc3{bottom:-16px; right:60px; animation-delay:2s, .6s;}
@media(max-width:980px){.fc1{right:6px;} .fc2{left:6px;}}

/* ---------- SECTIONS ---------- */
.section{padding:100px 0;}
.section-tight{padding:70px 0;}
.section-head{max-width:640px; margin:0 auto 56px; text-align:center;}
.section-head .kicker{font-size:13px; font-weight:700; color:var(--primary); text-transform:uppercase; letter-spacing:.08em; margin-bottom:14px; display:block;}
.section-head h2{font-size:clamp(28px,3.4vw,42px); font-weight:800; line-height:1.15; margin-bottom:14px;}
.section-head p{font-size:16.5px; color:var(--text-dim); line-height:1.6;}
.divider{height:1px; background:var(--border); width:100%;}

/* ---------- STEPS ---------- */
.steps{display:grid; grid-template-columns:repeat(3,1fr); gap:20px;}
@media(max-width:980px){.steps{grid-template-columns:repeat(1,1fr);}}
.step-card{background:var(--card); border:1px solid var(--border); border-radius:18px; padding:28px 24px; transition:transform .35s var(--ease), box-shadow .35s var(--ease), border-color .35s var(--ease);}
.step-card:hover{transform:translateY(-6px); box-shadow:var(--shadow-md); border-color:color-mix(in srgb, var(--primary) 25%, var(--border));}
.step-num{font-size:13px; font-weight:700; color:var(--text-faint); margin-bottom:16px;}
.step-icon{width:44px;height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; margin-bottom:18px; padding:10px; background:linear-gradient(150deg, color-mix(in srgb, var(--primary) 14%, transparent), color-mix(in srgb, var(--accent) 10%, transparent)); color:var(--primary); transition:transform .3s var(--ease);}
.step-card:hover .step-icon{transform:scale(1.1) rotate(-6deg);}
.step-card h3{font-size:16.5px; font-weight:700; margin-bottom:8px;}
.step-card p{font-size:14px; color:var(--text-dim); line-height:1.55;}

/* ---------- FEATURES ---------- */
.feat-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--border); border:1px solid var(--border); border-radius:20px; overflow:hidden;}
@media(max-width:980px){.feat-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:560px){.feat-grid{grid-template-columns:1fr;}}
.feat-cell{background:var(--card); padding:30px 26px; transition:background .3s var(--ease), transform .3s var(--ease);}
.feat-cell:hover{background:var(--bg-elev); transform:translateY(-3px);}
.feat-icon{width:36px;height:36px; margin-bottom:16px; color:var(--primary); padding:7px; background:color-mix(in srgb, var(--primary) 10%, transparent); border-radius:10px; transition:transform .3s var(--ease);}
.feat-cell:hover .feat-icon{transform:scale(1.12);}
.feat-cell h4{font-size:15.5px; font-weight:700; margin-bottom:6px;}
.feat-cell p{font-size:13.5px; color:var(--text-dim); line-height:1.5;}

/* ---------- TESTIMONIALS ---------- */
.reviews-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:20px;}
@media(max-width:900px){.reviews-grid{grid-template-columns:1fr;}}
.test-card{background:var(--card); border:1px solid var(--border); border-radius:18px; padding:26px; box-shadow:var(--shadow-sm); transition:transform .35s var(--ease), box-shadow .35s var(--ease);}
.test-card:hover{transform:translateY(-5px); box-shadow:var(--shadow-md);}
.stars{color:var(--amber); font-size:14px; margin-bottom:14px; letter-spacing:2px;}
.test-card p.quote{font-size:15px; line-height:1.6; color:var(--text); margin-bottom:20px;}
.test-user{display:flex; align-items:center; gap:10px;}
.avatar{width:38px;height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; color:#fff; flex-shrink:0; background:linear-gradient(135deg,var(--primary),var(--accent));}
.test-name{font-size:13.5px; font-weight:700;}
.test-role{font-size:12px; color:var(--text-faint);}

/* ---------- STATS ---------- */
.stats-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--border); border:1px solid var(--border); border-radius:20px; overflow:hidden;}
@media(max-width:768px){.stats-grid{grid-template-columns:repeat(2,1fr);}}
.stat-cell{background:var(--card); padding:36px 24px; text-align:center; transition:background .3s;}
.stat-cell:hover{background:var(--bg-elev);}
.stat-num{font-size:clamp(30px,3.6vw,44px); font-weight:800; letter-spacing:-.02em;}
.stat-label{font-size:13.5px; color:var(--text-dim); margin-top:6px; font-weight:500;}

/* ---------- FAQ ---------- */
.faq-list{max-width:760px; margin:0 auto;}
.faq-item{border-bottom:1px solid var(--border);}
.faq-q{display:flex; align-items:center; justify-content:space-between; padding:22px 4px; cursor:pointer; font-size:16px; font-weight:600;}
.faq-q .plus{width:20px;height:20px; flex-shrink:0; transition:transform .35s var(--ease); color:var(--text-dim);}
.faq-item.open .plus{transform:rotate(45deg); color:var(--primary);}
.faq-a{max-height:0; overflow:hidden; transition:max-height .4s var(--ease), padding .4s var(--ease);}
.faq-item.open .faq-a{max-height:220px; padding-bottom:22px;}
.faq-a p{font-size:14.5px; color:var(--text-dim); line-height:1.6; max-width:660px;}

/* ---------- BOTTOM CTA ---------- */
.bottom-cta{background:linear-gradient(150deg, #0B1220, #111827); border-radius:28px; padding:60px 48px; text-align:center; color:#fff; position:relative; overflow:hidden;}
html.dark .bottom-cta{background:linear-gradient(150deg, #131320, #09090B); border:1px solid var(--border);}
.bottom-cta h2{font-size:32px; font-weight:800; margin-bottom:14px;}
.bottom-cta p{color:rgba(255,255,255,0.65); font-size:15.5px; margin-bottom:32px;}
.bottom-cta .cta-row{display:flex; justify-content:center; gap:14px; flex-wrap:wrap;}

/* ---------- FOOTER ---------- */
.footer{padding:70px 0 34px; border-top:1px solid var(--border); background:var(--bg-elev);}
.footer-top{display:grid; grid-template-columns:1.4fr repeat(3,1fr); gap:40px; margin-bottom:50px;}
@media(max-width:768px){.footer-top{grid-template-columns:1fr 1fr; row-gap:32px;}}
.footer-col h5{font-size:13px; font-weight:700; color:var(--text-faint); text-transform:uppercase; letter-spacing:.06em; margin-bottom:16px;}
.footer-col a{display:block; font-size:14px; color:var(--text-dim); margin-bottom:12px; transition:color .2s;}
.footer-col a:hover{color:var(--text);}
.footer-bottom{display:flex; align-items:center; justify-content:space-between; padding-top:28px; border-top:1px solid var(--border); flex-wrap:wrap; gap:16px;}
.footer-bottom p{font-size:13px; color:var(--text-faint);}

.reveal{opacity:0; transform:translateY(28px); transition:opacity .8s var(--ease), transform .8s var(--ease);}
.reveal.in{opacity:1; transform:translateY(0);}
.reveal-stagger.in > *{animation:staggerUp .7s var(--ease) both;}
.reveal-stagger.in > *:nth-child(1){animation-delay:.03s;} .reveal-stagger.in > *:nth-child(2){animation-delay:.09s;}
.reveal-stagger.in > *:nth-child(3){animation-delay:.15s;} .reveal-stagger.in > *:nth-child(4){animation-delay:.21s;}
.reveal-stagger.in > *:nth-child(5){animation-delay:.27s;} .reveal-stagger.in > *:nth-child(6){animation-delay:.33s;}
@keyframes staggerUp{from{opacity:0; transform:translateY(20px);}to{opacity:1; transform:translateY(0);}}

/* ---------- AUTH ---------- */
.auth-wrap{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; position:relative; overflow:hidden;}
.auth-card{background:var(--card); border:1px solid var(--border); border-radius:22px; box-shadow:var(--shadow-lg); padding:40px; width:100%; max-width:420px; position:relative; z-index:1; animation:fadeUp .6s var(--ease) both;}
.auth-card h1{font-size:26px; margin-bottom:6px; font-weight:800;}
.auth-card .sub{color:var(--text-dim); margin-bottom:26px; font-size:14.5px;}
.field{margin-bottom:16px;}
.field label{display:block; font-size:13px; font-weight:600; margin-bottom:6px; color:var(--text-dim);}
.field .input-wrap{position:relative;}
.field input,.field select{width:100%; padding:12px 14px; border-radius:10px; border:1px solid var(--border); background:var(--bg-elev); color:var(--text); font-size:14.5px; transition:border .25s, box-shadow .25s;}
.field input:focus,.field select:focus{outline:none; border-color:var(--primary); box-shadow:0 0 0 4px var(--ring);}
.field .toggle-pass{position:absolute; right:12px; top:50%; transform:translateY(-50%); font-size:12.5px; color:var(--text-dim); font-weight:600; cursor:pointer;}
.err{color:var(--red); font-size:12.5px; margin-top:5px; display:none;}
.err.show{display:block; animation:shake .4s var(--ease);}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-4px);}75%{transform:translateX(4px);}}
.divider-or{display:flex; align-items:center; gap:10px; color:var(--text-faint); font-size:13px; margin:18px 0;}
.divider-or::before,.divider-or::after{content:""; flex:1; height:1px; background:var(--border);}
.row-between{display:flex; justify-content:space-between; align-items:center; font-size:13.5px; margin-bottom:16px; flex-wrap:wrap; gap:8px;}
.auth-foot{text-align:center; margin-top:20px; font-size:14px; color:var(--text-dim);}
.auth-foot a{color:var(--primary); font-weight:600;}
.check-label{display:flex; align-items:center; gap:6px; color:var(--text-dim);}
#googleBtnSlot{display:flex; justify-content:center;}
#googleBtnSlot iframe{border-radius:10px !important;}

/* ---------- APP SHELL ---------- */
.app-shell{display:flex; min-height:100vh;}
.sidebar{width:256px; background:var(--bg-elev); border-right:1px solid var(--border); display:flex; flex-direction:column; padding:20px 14px; position:sticky; top:0; height:100vh; flex-shrink:0; transition:transform .3s var(--ease); z-index:200;}
.sidebar .brand{padding:6px 10px 26px;}
.side-link{display:flex; align-items:center; gap:12px; padding:11px 14px; border-radius:11px; color:var(--text-dim); font-weight:600; font-size:14.5px; margin-bottom:3px; transition:all .25s var(--ease);}
.side-link .ic{width:19px; height:19px; flex-shrink:0;}
.side-link:hover{background:var(--border); color:var(--text); transform:translateX(2px);}
.side-link.active{background:linear-gradient(180deg, var(--primary), var(--primary-dim)); color:#fff; box-shadow:0 6px 16px -6px rgba(37,99,235,.5);}
.sidebar-foot{margin-top:auto; border-top:1px solid var(--border); padding-top:16px; display:flex; align-items:center; gap:10px;}
.avatar-sm{width:38px;height:38px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--accent)); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; flex-shrink:0; font-size:13px;}
.main-content{flex:1; padding:32px 40px; min-width:0;}
.topbar-mobile{display:none; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:1px solid var(--border); background:var(--bg-elev); position:sticky; top:0; z-index:150;}
.theme-toggle{width:44px;height:24px; border-radius:20px; background:var(--border); border:1px solid var(--border); position:relative; flex-shrink:0; cursor:pointer;}
.theme-toggle .knob{position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--accent)); transition:left .3s var(--ease);}
html.dark .theme-toggle .knob{left:22px;}
.page-title{font-size:27px; font-weight:800; margin-bottom:4px; letter-spacing:-0.02em;}
.page-sub{color:var(--text-dim); margin-bottom:28px; font-size:14.5px;}
#pageContent{animation:fadeUp .5s var(--ease) both;}
.profile-click {
  display:flex;
  align-items:center;
  gap:10px;
  flex:1;
  min-width:0;
  cursor:pointer;
  transition:opacity .2s ease;
}

.profile-click:hover {
  opacity:0.75;
}

.sidebar-foot .theme-toggle {
  flex-shrink:0;
  transition:opacity .2s ease;
}

.sidebar-foot .theme-toggle:hover {
  opacity:0.75;
}
/* dashboard */
.stat-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--border); border:1px solid var(--border); border-radius:20px; overflow:hidden; margin-bottom:28px;}
@media(max-width:900px){.stat-grid{grid-template-columns:repeat(2,1fr);}}
.stat-card{background:var(--card); padding:24px; display:flex; flex-direction:column; gap:10px; transition:background .3s;}
.stat-card:hover{background:var(--bg-elev);}
.stat-card .top{display:flex; justify-content:space-between; align-items:center;}
.stat-card .top .ic{width:22px;height:22px; color:var(--primary);}
.stat-card .val{font-size:26px; font-weight:800;}
.stat-card .lbl{color:var(--text-dim); font-size:13px; font-weight:500;}
.two-col{display:grid; grid-template-columns:2fr 1fr; gap:20px; align-items:start;}
@media(max-width:900px){.two-col{grid-template-columns:1fr;}}
.exams-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:20px;}
@media(max-width:900px){.exams-grid{grid-template-columns:1fr;}}
.list-item{display:flex; align-items:center; gap:14px; padding:14px 0; border-bottom:1px solid var(--border); transition:opacity .2s;}
.list-item:last-child{border-bottom:none;}
.check{width:22px;height:22px; border-radius:7px; border:2px solid var(--border); flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all .25s var(--ease); cursor:pointer;}
.check:hover{border-color:var(--primary); transform:scale(1.08);}
.check svg{width:13px;height:13px;}
.check.done{background:var(--accent); border-color:var(--accent); color:#fff;}
.task-meta{display:flex; gap:8px; margin-top:6px; flex-wrap:wrap; align-items:center;}
.tag{padding:3px 10px; border-radius:8px; font-size:11px; font-weight:700;}
.prio-high{background:color-mix(in srgb, var(--red) 14%, transparent); color:var(--red);}
.prio-medium{background:color-mix(in srgb, var(--amber) 14%, transparent); color:var(--amber);}
.prio-low{background:color-mix(in srgb, var(--accent) 14%, transparent); color:var(--accent);}
.subj-math{background:color-mix(in srgb, var(--primary) 14%, transparent); color:var(--primary);}
.subj-science{background:color-mix(in srgb, var(--accent) 14%, transparent); color:var(--accent);}
.subj-english{background:color-mix(in srgb, #a855f7 16%, transparent); color:#a855f7;}
.subj-other{background:color-mix(in srgb, var(--text-faint) 16%, transparent); color:var(--text-dim);}
.meta-small{color:var(--text-faint); font-size:11.5px;}
.progress-bar{width:100%; height:9px; border-radius:6px; background:var(--border); overflow:hidden; margin-top:8px;}
.progress-fill{height:100%; background:linear-gradient(90deg,var(--primary),var(--accent)); border-radius:6px; transition:width .6s var(--ease);}
.quick-actions{display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:14px; margin-top:20px;}
@media(max-width:900px){.quick-actions{grid-template-columns:repeat(2,minmax(0,1fr));}}
@media(max-width:520px){.quick-actions{grid-template-columns:1fr; gap:12px;}}
.qa-btn{display:inline-flex; align-items:center; justify-content:center; gap:9px; background:linear-gradient(100deg, var(--primary-dim), var(--accent)); border:none; border-radius:10px; padding:7px 14px; font-size:13px; font-weight:700; color:#fff; transition:transform .18s var(--ease), box-shadow .2s; box-shadow:0 4px 14px -6px rgba(37,99,235,.55); cursor:pointer; white-space:nowrap; height:42px; width:100%;}
.qa-btn:hover{transform:translateY(-2px); box-shadow:0 8px 18px -6px rgba(37,99,235,.6);}
.qa-btn:active{transform:translateY(0); box-shadow:0 2px 8px -4px rgba(37,99,235,.4);}
.qa-btn .ic{width:24px;height:24px; color:#fff; flex-shrink:0; background:rgba(255,255,255,.22); border-radius:7px; padding:5px; display:flex; align-items:center; justify-content:center;}

/* filters/tabs */
.tabs{display:flex; gap:8px; margin-bottom:22px; flex-wrap:wrap;}
.tab{padding:9px 16px; border-radius:10px; font-weight:600; font-size:13.5px; background:var(--bg-elev); color:var(--text-dim); border:1px solid var(--border); transition:all .25s var(--ease);}
.tab.active{background:linear-gradient(180deg,var(--primary),var(--primary-dim)); color:#fff; border-color:transparent;}
.page-header-row{display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; flex-wrap:wrap; gap:14px;}

/* modal */
.modal-overlay{position:fixed; inset:0; background:rgba(5,5,10,.55); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; z-index:500; padding:20px; animation:fadeIn .25s var(--ease);}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal{background:var(--card); border:1px solid var(--border); border-radius:20px; padding:28px; width:100%; max-width:460px; max-height:90vh; overflow-y:auto; box-shadow:var(--shadow-xl); animation:modalPop .3s var(--ease);}
@keyframes modalPop{from{opacity:0; transform:scale(.94) translateY(10px);}to{opacity:1; transform:scale(1) translateY(0);}}
.modal h3{font-size:19px; margin-bottom:18px; font-weight:800;}

/* empty state */
.empty-state{text-align:center; padding:60px 20px; color:var(--text-dim);}
.empty-state .ic{width:52px;height:52px; margin:0 auto 18px; color:var(--text-faint);}
.empty-state h3{font-size:18px; margin-bottom:8px; color:var(--text);}
.empty-state p{font-size:14px; max-width:340px; margin:0 auto 20px; line-height:1.6;}

/* calendar */
.cal-header{display:flex; justify-content:space-between; align-items:center; margin-bottom:18px;}
.cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:8px;}
.cal-dow{text-align:center; font-size:12px; font-weight:700; color:var(--text-faint); padding:6px 0;}
.cal-cell{min-height:92px; border:1px solid var(--border); border-radius:12px; padding:6px; font-size:12px; background:var(--bg-elev); transition:border-color .2s;}
.cal-cell.other{opacity:.35;}
.cal-cell .dnum{font-weight:700; margin-bottom:4px;}
.cal-cell.today{border-color:var(--primary); box-shadow:0 0 0 2px var(--ring);}
.cal-evt{padding:2px 6px; border-radius:6px; font-size:10.5px; margin-bottom:3px; font-weight:600; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.legend-row{display:flex; gap:18px; margin-top:16px; flex-wrap:wrap; font-size:12.5px; color:var(--text-dim); align-items:center;}
.legend-dot{width:9px;height:9px;border-radius:50%; display:inline-block; margin-right:6px;}

/* timer */
.timer-wrap{display:flex; flex-direction:column; align-items:center; padding:40px 0;}
.timer-modes{display:flex; gap:10px; margin-bottom:34px; flex-wrap:wrap; justify-content:center;}
.timer-ring{width:280px; height:280px; border-radius:50%; background:conic-gradient(var(--primary) calc(var(--pct,0)*1%), var(--border) 0); display:flex; align-items:center; justify-content:center; position:relative; transition:background .3s;}
.timer-ring::before{content:""; position:absolute; inset:14px; border-radius:50%; background:var(--card);}
.timer-display{position:relative; z-index:2; text-align:center;}
.timer-display .time{font-size:50px; font-weight:800; letter-spacing:-0.02em;}
.timer-display .phase{color:var(--text-dim); font-weight:600; margin-top:6px; font-size:13.5px; text-transform:uppercase; letter-spacing:.05em;}
.timer-controls{display:flex; gap:14px; margin-top:34px; align-items:center;}
.timer-controls button{width:54px; height:54px; border-radius:50%; background:var(--bg-elev); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; color:var(--text-dim); transition:transform .25s var(--ease);}
.timer-controls button:hover{transform:scale(1.08);}
.timer-controls button svg{width:20px;height:20px;}
.timer-controls .primary{background:linear-gradient(180deg,var(--primary),var(--primary-dim)); color:#fff; width:66px; height:66px; box-shadow:0 8px 20px -6px rgba(37,99,235,.55);}
.timer-controls .primary svg{width:24px;height:24px;}

/* notes */
.notes-layout{display:grid; grid-template-columns:220px 1fr; gap:20px; align-items:start;}
@media(max-width:900px){.notes-layout{grid-template-columns:1fr;}}
.folder-list .side-link{cursor:pointer;}
.note-card{cursor:pointer;}
.note-card:hover{transform:translateY(-3px); box-shadow:var(--shadow-md);}
.note-preview{color:var(--text-dim); font-size:13px; margin-top:8px; max-height:42px; overflow:hidden;}
.notes-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:16px;}
.search-box-sm{display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--border); border-radius:14px; padding:0 16px; height:50px; margin-bottom:20px; transition:border-color .25s, box-shadow .25s;}
.search-box-sm:focus-within{border-color:color-mix(in srgb, var(--primary) 45%, var(--border)); box-shadow:0 0 0 4px var(--ring);}
.search-box-sm svg{width:17px;height:17px; color:var(--text-faint); flex-shrink:0;}
.search-box-sm input{flex:1; height:100%; border:none; background:transparent; outline:none; color:var(--text); font-size:14.5px;}

/* progress */
.bars-chart{display:flex; align-items:flex-end; gap:14px; height:180px; padding-top:20px;}
.bar-col{flex:1; display:flex; flex-direction:column; align-items:center; gap:8px;}
.bar{width:100%; border-radius:8px 8px 0 0; background:linear-gradient(180deg,var(--primary),var(--accent)); transition:height .6s var(--ease);}
.bar-col .lbl{font-size:12px; color:var(--text-faint);}
.achv-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:16px;}
@media(max-width:768px){.achv-grid{grid-template-columns:repeat(2,1fr);}}
.achv-card{text-align:center; opacity:.4; transition:opacity .3s, transform .3s var(--ease);}
.achv-card.unlocked{opacity:1;}
.achv-card:hover{transform:translateY(-3px);}
.achv-card .ic{width:36px;height:36px; margin:0 auto 10px; color:var(--accent);}

/* hub */
.hub-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:20px;}
@media(max-width:980px){.hub-grid{grid-template-columns:1fr;}}
.hub-card h3{margin-bottom:10px; display:flex; align-items:center; gap:10px; font-size:16.5px;}
.hub-card h3 svg{width:20px;height:20px; color:var(--primary); flex-shrink:0;}
.hub-card ul{margin:12px 0 0 0; padding:0; list-style:none; color:var(--text-dim); font-size:13.5px; line-height:1.7;}
.hub-card ul li{display:flex; gap:8px; margin-bottom:6px;}
.hub-card ul li::before{content:""; width:5px;height:5px;border-radius:50%; background:var(--accent); margin-top:8px; flex-shrink:0;}

/* settings */
.settings-grid{display:grid; grid-template-columns:2fr 1fr; gap:20px; align-items:start;}
@media(max-width:900px){.settings-grid{grid-template-columns:1fr;}}
.switch-row{display:flex; justify-content:space-between; align-items:center; padding:15px 0; border-bottom:1px solid var(--border);}
.switch-row:last-child{border-bottom:none;}

@media (max-width:900px){ .nav-links{display:none;} }
@media (max-width:900px){
  .main-content{padding:24px;}
}
@media (max-width:768px){
  .stat-grid{grid-template-columns:repeat(2,1fr);}
  .achv-grid{grid-template-columns:repeat(2,1fr);}
}
@media (max-width:640px){
  .sidebar{position:fixed; left:0; top:0; transform:translateX(-100%); box-shadow:var(--shadow-lg);}
  .sidebar.open{transform:translateX(0);}
  .topbar-mobile{display:flex;}
  .main-content{padding:20px;}
  .cal-cell{min-height:60px; font-size:10px;}
  .hero h1{font-size:32px;}
  .stat-grid,.achv-grid{grid-template-columns:1fr 1fr;}
}

const API_BASE = '';
let GOOGLE_CLIENT_ID = '';
async function api(path, opts={}){
  const headers = Object.assign({'Content-Type':'application/json'}, opts.headers||{});
  const token = localStorage.getItem('sf_token');
  if(token) headers['Authorization'] = 'Bearer '+token;
  const res = await fetch(API_BASE+path, Object.assign({}, opts, {headers}));
  let data = {};
  try{ data = await res.json(); }catch(e){}
  if(!res.ok) throw new Error(data.error || 'Something went wrong. Please try again.');
  return data;
}

const DB = {
  get(key, fallback){ try{ const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }catch(e){ return fallback; } },
  set(key, val){ localStorage.setItem(key, JSON.stringify(val)); }
};
function uid(){ return Math.random().toString(36).slice(2,10); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function daysBetween(dateStr){ const d1=new Date(todayISO()); const d2=new Date(dateStr); return Math.ceil((d2-d1)/(1000*60*60*24)); }
function fmtDate(d){ return new Date(d).toLocaleDateString(undefined,{month:'short',day:'numeric'}); }
function addDays(n){ const d=new Date(); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }

let STATE = {
  user: null,
  theme: DB.get('sf_theme', 'dark'),
  tasks: [], exams: [], notes: [], sessions: [], streak: 0,
  route: location.hash.replace('#','') || '/landing'
};
function userKey(suffix){ return 'sf_'+(STATE.user ? STATE.user.id : 'anon')+'_'+suffix; }
function loadUserData(){
  STATE.tasks = DB.get(userKey('tasks'), []);
  STATE.exams = DB.get(userKey('exams'), []);
  STATE.notes = DB.get(userKey('notes'), []);
  STATE.sessions = DB.get(userKey('sessions'), []);
  STATE.streak = DB.get(userKey('streak'), 0);
  updateStreak();
}
function updateStreak(){
  if(!STATE.user) return;
  const today = todayISO();
  const lastKey = userKey('laststreakdate');
  const last = DB.get(lastKey, null);
  if(last === today) return; // already logged in today, streak unchanged
  if(last){
    const diffDays = Math.round((new Date(today) - new Date(last)) / (1000*60*60*24));
    if(diffDays === 1){ STATE.streak = (STATE.streak||0) + 1; }
    else if(diffDays > 1){ STATE.streak = 1; }
    else { STATE.streak = STATE.streak || 1; }
  } else {
    STATE.streak = 1;
  }
  DB.set(lastKey, today);
  DB.set(userKey('streak'), STATE.streak);
}
function persist(){
  DB.set('sf_theme', STATE.theme);
  if(!STATE.user) return;
  DB.set(userKey('tasks'), STATE.tasks); DB.set(userKey('exams'), STATE.exams);
  DB.set(userKey('notes'), STATE.notes); DB.set(userKey('sessions'), STATE.sessions);
  DB.set(userKey('streak'), STATE.streak);
}

let scrollObserver = null;
function afterLandingRender(){
  const navEl = document.getElementById('nav');
  const onScroll = ()=>{ if(window.scrollY > 10) navEl.classList.add('scrolled'); else navEl.classList.remove('scrolled'); };
  window.addEventListener('scroll', onScroll); onScroll();
  document.getElementById('themeToggle').onclick = toggleTheme;
  const h = document.getElementById('hamburger');
  if(h) h.onclick = ()=> document.getElementById('mobileMenu').classList.toggle('open');
  document.querySelectorAll('a[href^="#"]:not([href^="#/"])').forEach(a=>{
    a.addEventListener('click', e=>{
      const id = a.getAttribute('href').slice(1);
      const el = document.getElementById(id);
      if(el){ e.preventDefault(); el.scrollIntoView({behavior:'smooth'}); document.getElementById('mobileMenu')?.classList.remove('open'); }
    });
  });
  // Scroll-triggered reveal animation — cards fade/slide in as you scroll to them
  if(scrollObserver) scrollObserver.disconnect();
  scrollObserver = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){ entry.target.classList.add('in'); scrollObserver.unobserve(entry.target); }
    });
  }, { threshold: 0.15, rootMargin: '0px 0px -60px 0px' });
  document.querySelectorAll('.reveal').forEach(el=> scrollObserver.observe(el));
}

/* ---- CALENDAR ---- */
let calDate = new Date();
function pageCalendar(){
  const y = calDate.getFullYear(), m = calDate.getMonth();
  const first = new Date(y,m,1); const startDow = first.getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const daysInPrev = new Date(y,m,0).getDate();
  const events = {};
  STATE.tasks.forEach(t=> (events[t.deadline] ||= []).push({title:t.title, subject:t.subject}));
  STATE.exams.forEach(e=> (events[e.date] ||= []).push({title:e.name, subject:'exam'}));
  const cells = [];
  for(let i=startDow-1;i>=0;i--) cells.push({d:daysInPrev-i, other:true});
  for(let d=1; d<=daysInMonth; d++) cells.push({d, other:false, iso:`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`});
  while(cells.length % 7 !== 0) cells.push({d:cells.length, other:true});
  const colors = {math:'#3B82F6', science:'#10B981', english:'#A855F7', other:'#8A8E99', exam:'#DC2626'};
  return `
  <div class="page-title">Calendar</div>
  <div class="page-sub">Monthly overview of tasks, exams, and study sessions.</div>
  <div class="card">
    <div class="cal-header">
      <button class="btn btn-secondary btn-sm" onclick="calDate=new Date(${y},${m-1},1);render();">← Prev</button>
      <h3 style="font-size:16.5px;">${first.toLocaleDateString(undefined,{month:'long',year:'numeric'})}</h3>
      <button class="btn btn-secondary btn-sm" onclick="calDate=new Date(${y},${m+1},1);render();">Next →</button>
    </div>
    <div class="cal-grid">
      ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}
      ${cells.map(c=>{
        const isToday = c.iso === todayISO();
        const evs = c.iso ? (events[c.iso]||[]) : [];
        return `<div class="cal-cell ${c.other?'other':''} ${isToday?'today':''}">
          <div class="dnum">${c.d}</div>
          ${evs.slice(0,3).map(e=>`<div class="cal-evt" style="background:${colors[e.subject]||colors.other}">${e.title}</div>`).join('')}
        </div>`;
      }).join('')}
    </div>
    <div class="legend-row">
      <span><span class="legend-dot" style="background:#3B82F6;"></span>Math</span>
      <span><span class="legend-dot" style="background:#10B981;"></span>Science</span>
      <span><span class="legend-dot" style="background:#A855F7;"></span>English</span>
      <span><span class="legend-dot" style="background:#DC2626;"></span>Exams</span>
    </div>
  </div>`;
}

/* ---- TIMER ---- */
let timerMode = 'pomodoro';
let timerState = { total: 25*60, remaining: 25*60, running:false, phase:'Focus' };
let timerInterval = null;
const TIMER_MODES = { pomodoro:{focus:25*60, brk:5*60}, deep:{focus:50*60, brk:10*60}, custom:{focus:30*60, brk:5*60} };
function pageTimer(){
  const completedToday = STATE.sessions.filter(s=>s.date===todayISO()).length;
  return `
  <div class="page-title">Study Timer</div>
  <div class="page-sub">Stay focused with Pomodoro or deep focus sessions.</div>
  <div class="timer-wrap">
    <div class="timer-modes">
      <div class="tab ${timerMode==='pomodoro'?'active':''}" onclick="setTimerMode('pomodoro')">Pomodoro 25 / 5</div>
      <div class="tab ${timerMode==='deep'?'active':''}" onclick="setTimerMode('deep')">Deep Focus 50 / 10</div>
      <div class="tab ${timerMode==='custom'?'active':''}" onclick="setTimerMode('custom')">Custom 30 / 5</div>
    </div>
    <div class="timer-ring" id="timerRing" style="--pct:0;">
      <div class="timer-display">
        <div class="time" id="timeDisplay">${fmtTime(timerState.remaining)}</div>
        <div class="phase" id="phaseDisplay">${timerState.phase}</div>
      </div>
    </div>
    <div class="timer-controls">
      <button onclick="resetTimer()">${icon('reset')}</button>
      <button class="primary" id="playPauseBtn" onclick="toggleTimer()">${timerState.running?icon('pause'):icon('play')}</button>
      <button onclick="skipPhase()">${icon('skip')}</button>
    </div>
    <div class="card" style="margin-top:34px;width:100%;max-width:400px;text-align:center;">
      <div style="font-size:26px;font-weight:800;">${completedToday}</div>
      <div style="color:var(--text-dim);font-size:13px;">sessions completed today</div>
    </div>
  </div>`;
}
function fmtTime(s){ const m=Math.floor(s/60); const sec=s%60; return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`; }
function setTimerMode(mode){ timerMode = mode; clearInterval(timerInterval); const cfg=TIMER_MODES[mode]; timerState={total:cfg.focus, remaining:cfg.focus, running:false, phase:'Focus'}; render(); }
function initTimer(){ updateRing(); }
function updateRing(){
  const ring = document.getElementById('timerRing'); if(!ring) return;
  const pct = Math.round(((timerState.total-timerState.remaining)/timerState.total)*100);
  ring.style.setProperty('--pct', pct);
  document.getElementById('timeDisplay').textContent = fmtTime(timerState.remaining);
  document.getElementById('phaseDisplay').textContent = timerState.phase;
}
function toggleTimer(){
  timerState.running = !timerState.running;
  document.getElementById('playPauseBtn').innerHTML = timerState.running ? icon('pause') : icon('play');
  if(timerState.running){
    timerInterval = setInterval(()=>{
      timerState.remaining--;
      if(timerState.remaining <= 0){
        if(timerState.phase==='Focus'){
          STATE.sessions.push({date:todayISO(), mins: Math.round(TIMER_MODES[timerMode].focus/60)});
          persist();
          timerState.phase='Break'; timerState.total=TIMER_MODES[timerMode].brk; timerState.remaining=TIMER_MODES[timerMode].brk;
        } else {
          timerState.phase='Focus'; timerState.total=TIMER_MODES[timerMode].focus; timerState.remaining=TIMER_MODES[timerMode].focus;
        }
      }
      updateRing();
    },1000);
  } else { clearInterval(timerInterval); }
}
function resetTimer(){ clearInterval(timerInterval); const cfg=TIMER_MODES[timerMode]; timerState={total:cfg.focus, remaining:cfg.focus, running:false, phase:'Focus'}; render(); }
function skipPhase(){
  clearInterval(timerInterval);
  if(timerState.phase==='Focus'){ timerState.phase='Break'; timerState.total=TIMER_MODES[timerMode].brk; timerState.remaining=TIMER_MODES[timerMode].brk; }
  else { timerState.phase='Focus'; timerState.total=TIMER_MODES[timerMode].focus; timerState.remaining=TIMER_MODES[timerMode].focus; }
  timerState.running=false; render();
}

      <div class="field"><label>Title</label><input id="nf_title" required value="${n?n.title:''}"></div>
      <div class="field"><label>Folder</label><input id="nf_folder" placeholder="e.g. Math" value="${n?n.folder:''}"></div>
      <div class="field"><label>Content</label><textarea id="nf_content" rows="6" style="width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg-elev);color:var(--text);font-family:inherit;font-size:14.5px;">${n?n.content:''}</textarea></div>
      <button class="btn btn-primary btn-block" type="submit">${n?'Save Changes':'Create Note'}</button>
    </form>`, ()=>{
      document.getElementById('noteForm').onsubmit = e=>{
        e.preventDefault();
        const data = {title:val('nf_title'), folder:val('nf_folder')||'General', content:val('nf_content'), updated:todayISO()};
        if(n){ Object.assign(n,data); } else { STATE.notes.unshift({id:uid(), ...data}); }
        persist(); closeModal(); render();
      };
    });
}

/* ---- PROGRESS ---- */
function pageProgress(){
  const week = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const totalMins = STATE.sessions.reduce((a,s)=>a+s.mins,0);
  const byDay = week.map(()=> totalMins ? Math.min(140, totalMins*2) / 7 : 0);
  const completed = STATE.tasks.filter(t=>t.done).length; const total = STATE.tasks.length || 1;
  const subjCounts = {};
  STATE.tasks.forEach(t=> subjCounts[t.subject] = (subjCounts[t.subject]||0)+1);
  const achievements = [
    {ic:'trophy', label:'First Study Session', unlocked: STATE.sessions.length>0},
    {ic:'trophy', label:'7 Day Streak', unlocked: STATE.streak>=7},
    {ic:'trophy', label:'50 Tasks Completed', unlocked: completed>=50},
    {ic:'trophy', label:'Exam Ready', unlocked: STATE.exams.some(e=>e.topics.length && e.topics.every(t=>t.done))},
  ];
  return `
  <div class="page-title">Progress Tracker</div>
  <div class="page-sub">See your habits and celebrate your wins.</div>
  <div class="two-col">
    <div class="card">
      <h3 style="font-size:16.5px;">Weekly Study Hours</h3>
      <div class="bars-chart">
        ${byDay.map((v,i)=>`<div class="bar-col"><div class="bar" style="height:${Math.max(6,Math.round(v))}px;"></div><div class="lbl">${week[i]}</div></div>`).join('')}
      </div>
    </div>
    <div class="card">
      <h3 style="font-size:16.5px;">Task Completion</h3>
      <div style="text-align:center;padding:20px 0;">
        <div style="font-size:36px;font-weight:800;color:var(--primary);">${STATE.tasks.length ? Math.round(completed/total*100) : 0}%</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${STATE.tasks.length ? Math.round(completed/total*100) : 0}%;"></div></div>
        <div style="color:var(--text-dim);margin-top:10px;font-size:13.5px;">${completed} of ${STATE.tasks.length} tasks completed</div>
      </div>
      <h3 style="margin-top:10px;font-size:15px;">Subject Breakdown</h3>
      ${Object.entries(subjCounts).map(([s,c])=>`<div style="display:flex;justify-content:space-between;padding:8px 0;font-size:13.5px;"><span class="tag subj-${s}">${s}</span><span>${c} tasks</span></div>`).join('') || emptyMsg('No data yet')}
    </div>
  </div>
  <h3 style="margin:28px 0 16px;font-size:16.5px;">Achievements</h3>
  <div class="achv-grid">
    ${achievements.map(a=>`<div class="card achv-card ${a.unlocked?'unlocked':''}"><div class="ic">${icon(a.ic)}</div><div style="font-weight:700;font-size:13px;">${a.label}</div></div>`).join('')}
  </div>`;
}

/* ---- STUDY HUB ---- */
function pageHub(){
  const items = [
    ['brain','Active Recall','Test yourself instead of re-reading notes to boost long-term memory.', ['Cover your notes and try to recall key points','Use flashcards to quiz yourself','Explain concepts out loud without looking']],
    ['repeat','Spaced Repetition','Review material at increasing intervals to move it into long-term memory.', ['Review new material after 1 day, then 3 days, then a week','Use a spaced repetition app or simple calendar reminders','Focus more time on topics you forget quickly']],
    ['clock2','Pomodoro Technique','Work in short, focused bursts with breaks to maintain concentration.', ['Study for 25 minutes with zero distractions','Take a 5 minute break','After 4 rounds, take a longer 20-30 minute break']],
    ['book','Feynman Technique','Explain a concept in simple terms to find and fill gaps in understanding.', ['Pick a topic and explain it like teaching a child','Identify gaps where your explanation breaks down','Go back to the material and simplify further']],
    ['target','Avoiding Procrastination','Build momentum with small, manageable steps.', ['Break big tasks into 10-15 minute chunks','Remove distractions before you start','Use the "2 minute rule" — just start']],
    ['stack','Exam Preparation Tips','Practical strategies for effective exam readiness.', ['Start revising early using the Exam Planner','Practice with past papers under timed conditions','Prioritize topics with the most exam weight']],
  ];
  return `
  <div class="page-title">Study Hub</div>
  <div class="page-sub">Learn proven techniques to study more effectively.</div>
  <div class="hub-grid">
    ${items.map(([ic,t,d,steps])=>`<div class="card hub-card"><h3>${icon(ic)}${t}</h3><p style="color:var(--text-dim);font-size:14px;">${d}</p><ul>${steps.map(s=>`<li>${s}</li>`).join('')}</ul></div>`).join('')}
  </div>`;
}

/* ---- SETTINGS ---- */
function pageSettings(){
  return `
  <div class="page-title">Settings</div>
  <div class="page-sub">Manage your profile and preferences.</div>
  <div class="settings-grid">
    <div class="card">
      <h3 style="margin-bottom:14px;font-size:16.5px;">Profile</h3>
      <form id="profileForm">
        <div class="field"><label>Name</label><input id="pf_name" value="${STATE.user.name}"></div>
        <div class="field"><label>Email</label><input id="pf_email" value="${STATE.user.email}" disabled></div>
        <div class="field"><label>Year level</label><input id="pf_year" value="${STATE.user.year||''}"></div>
        <div class="field"><label>Subjects</label><input id="pf_subjects" value="${STATE.user.subjects||''}"></div>
        <button class="btn btn-primary" type="submit">Save Changes</button>
      </form>
    </div>
    <div class="card">
      <h3 style="margin-bottom:6px;font-size:16.5px;">Preferences</h3>
      <div class="switch-row"><span>Dark mode</span><div class="theme-toggle" onclick="toggleTheme()"><div class="knob"></div></div></div>
      <div class="switch-row"><span>Notifications</span><div class="theme-toggle" id="notifToggle" onclick="this.classList.toggle('on');this.querySelector('.knob').style.left=this.classList.contains('on')?'22px':'2px';"><div class="knob"></div></div></div>
      <h3 style="margin:22px 0 6px;font-size:16.5px;">Account</h3>
      <button class="btn btn-secondary btn-block" style="margin-bottom:10px;" onclick="logout()">Logout</button>
      <button class="btn btn-danger btn-block" onclick="deleteAccount()">Delete Account</button>
    </div>
  </div>`;
}
function logout(){ localStorage.removeItem('sf_token'); STATE.user = null; nav('/landing'); }
async function deleteAccount(){
  if(!confirm('This will permanently delete your account and all local data. Continue?')) return;
  try{ await api('/api/me', { method:'DELETE' }); }catch(e){}
  localStorage.removeItem('sf_token');
  STATE.user = null; nav('/landing');
}
document.addEventListener('submit', async function(e){
  if(e.target.id === 'profileForm'){
    e.preventDefault();
    const name = val('pf_name'), year = val('pf_year'), subjects = val('pf_subjects');
    try{
      const data = await api('/api/me', { method:'PUT', body: JSON.stringify({ name, year, subjects }) });
      STATE.user = data.user; render(); alert('Profile updated!');
    }catch(err){ alert(err.message); }
  }
});

/* ========================= MODAL HELPERS ========================= */
function val(id){ return document.getElementById(id).value; }
function showModal(html, onMount){
  document.getElementById('modalRoot').innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`;
  if(onMount) onMount();
}
function closeModal(){ const r = document.getElementById('modalRoot'); if(r) r.innerHTML=''; }

/* ========================= INIT ========================= */
(async function init(){
  await restoreSession();
  await ensureGoogleClientId();
  render();
})();
</script>
</body>
</html>
